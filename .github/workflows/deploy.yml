name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx tsc --noEmit

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  deploy-supabase-functions:
    name: Deploy Supabase Functions
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        run: |
          supabase functions deploy crear-proyecto --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy actualizar-estado --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy registrar-bloqueo --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy generar-semaforo --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy enviar-notificacion --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy exportar-pdf --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
